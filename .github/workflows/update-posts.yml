name: Update Substack Posts

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6am UTC
  workflow_dispatch:        # also lets you trigger it manually from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Substack RSS and write posts.json
        run: |
          curl -s "https://izzimaria.substack.com/feed" -o feed.xml

          python3 - <<'EOF'
          from lxml import etree
          import json, re
          from email.utils import parsedate_to_datetime

          parser = etree.XMLParser(recover=True)
          tree = etree.parse('feed.xml', parser)
          root = tree.getroot()
          channel = root.find('channel')

          posts = []
          for item in channel.findall('item'):
              title = (item.findtext('title') or '').strip()
              if title.lower() == 'coming soon':
                  continue
              link = (item.findtext('link') or '').strip()
              pub_date = (item.findtext('pubDate') or '').strip()
              desc_raw = item.findtext('description') or ''

              # Strip HTML tags from description
              desc = re.sub(r'<[^>]+>', '', desc_raw).strip()
              if len(desc) > 200:
                  desc = desc[:200].rstrip() + '…'

              # Format date
              date_str = ''
              if pub_date:
                  try:
                      d = parsedate_to_datetime(pub_date)
                      date_str = d.strftime('%b %Y')
                  except Exception:
                      pass

              posts.append({'title': title, 'link': link, 'date': date_str, 'desc': desc})

          with open('posts.json', 'w') as f:
              json.dump(posts, f, indent=2)
          print(f"Wrote {len(posts)} posts to posts.json")
          EOF

      - name: Commit posts.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git diff --cached --quiet || git commit -m "chore: update Substack posts"
          git push
